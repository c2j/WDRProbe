name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x86_64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x86_64
          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            name: Linux-arm64
            cross: true
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x86_64
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            name: Windows-arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './Desktop/src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: Desktop/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Desktop

      # ── macOS/Windows: tauri-action ───────────────────────────────────

      - name: Build and release Tauri application (macOS/Windows)
        if: startsWith(matrix.name, 'macOS') || startsWith(matrix.name, 'Windows')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: Desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'WDRProbe Desktop ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # ── Linux: build inside ubuntu:20.04 Docker for glibc 2.31 ────────
      # ubuntu-20.04 runners are deprecated. Docker container provides
      # glibc 2.31 natively — no zigbuild or cross-glibc tricks needed.

      - name: Build Linux x86_64 binary (focal container)
        if: matrix.name == 'Linux-x86_64'
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e GITHUB_ACTIONS \
            ubuntu:20.04 \
            bash -c '
              set -ex
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y \
                libwebkit2gtk-4.0-dev libgtk-3-dev libappindicator3-dev \
                librsvg2-dev patchelf curl pkg-config

              curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
              source ~/.cargo/env

              curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
              apt-get install -y nodejs

              cd /work/Desktop
              npm ci
              npm run build
              cd src-tauri
              cargo build --release
            '

          echo "LINUX_BINARY=target/release/wdrprobe-desktop" >> $GITHUB_ENV

      - name: Build Linux arm64 binary (focal container, cross-compile)
        if: matrix.name == 'Linux-arm64'
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e GITHUB_ACTIONS \
            ubuntu:20.04 \
            bash -c '
              set -ex
              export DEBIAN_FRONTEND=noninteractive
              apt-get update

              dpkg --add-architecture arm64
              cat <<REPO | tee /etc/apt/sources.list.d/arm64.list
              deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports focal main restricted universe multiverse
              deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports focal-updates main restricted universe multiverse
              deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports focal-security main restricted universe multiverse
              REPO

              sed -i "/^deb /{ /\[arch=/!s/^deb /deb [arch=amd64] / }" /etc/apt/sources.list
              apt-get update

              apt-get install -y \
                gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
                libwebkit2gtk-4.0-dev:arm64 libgtk-3-dev:arm64 \
                libappindicator3-dev:arm64 librsvg2-dev:arm64 \
                libssl-dev:arm64 patchelf curl pkg-config

              curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
              source ~/.cargo/env
              rustup target add aarch64-unknown-linux-gnu

              mkdir -p ~/.cargo
              cat <<CARGO >> ~/.cargo/config.toml
              [target.aarch64-unknown-linux-gnu]
              linker = "aarch64-linux-gnu-gcc"
              CARGO

              curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
              apt-get install -y nodejs

              export PKG_CONFIG_ALLOW_CROSS=1
              export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig

              cd /work/Desktop
              npm ci
              npm run build
              cd src-tauri
              cargo build --release --target aarch64-unknown-linux-gnu
            '

          echo "LINUX_BINARY=target/aarch64-unknown-linux-gnu/release/wdrprobe-desktop" >> $GITHUB_ENV

      - name: Create portable zip (Linux)
        if: startsWith(matrix.name, 'Linux')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            ARCH="x86_64"
          else
            ARCH="arm64"
          fi
          ZIP_NAME="WDRProbe-Desktop-${VERSION}-linux-${ARCH}.zip"

          cd "${LINUX_BINARY%/*}"
          BINARY="${LINUX_BINARY##*/}"
          zip "${ZIP_NAME}" "${BINARY}"
          echo "PORTABLE_ZIP=$(pwd)/${ZIP_NAME}" >> $GITHUB_ENV

          gh release create "${{ github.ref_name }}" \
            --draft --title "WDRProbe Desktop ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" 2>/dev/null || true

      - name: Create portable zip (Windows x86_64)
        if: startsWith(matrix.name, 'Windows') && matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}" -replace '^v', ''
          $TARGET_DIR = "target/${{ matrix.target }}/release"
          $ZIP_NAME = "WDRProbe-Desktop-${VERSION}-windows-x86_64.zip"
          Set-Location $TARGET_DIR
          $BINARY = Get-ChildItem -Filter "WDRProbe*.exe" -File | Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          if (-not $BINARY) {
            $BINARY = Get-ChildItem -Filter "wdrprobe*.exe" -File | Select-Object -First 1
          }
          Write-Host "Found binary: $($BINARY.Name)"
          Compress-Archive -Path $BINARY.FullName -DestinationPath $ZIP_NAME
          "PORTABLE_ZIP=$(Get-Location)\${ZIP_NAME}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload portable zip to release
        if: env.PORTABLE_ZIP != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" "${{ env.PORTABLE_ZIP }}" --clobber
