name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
            cross: true

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: Desktop/package-lock.json

      # ── Windows: native runner ────────────────────────────────────────

      - name: Build (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cd Desktop
          npm ci
          npm run build
          cd src-tauri
          cargo build --release -p wdrprobe-desktop
          cargo build --release -p wdrprobe-cli

      - name: Create zip (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = "${{ github.ref_name }}" -replace '^v', ''
          $ZIP_NAME = "WDRProbe-${VERSION}-${{ matrix.name }}.zip"
          $TARGET_DIR = "target\release"
          $DESKTOP = "$TARGET_DIR\wdrprobe-desktop.exe"
          $CLI = "$TARGET_DIR\wdrprobe-cli.exe"
          if (-not (Test-Path $DESKTOP)) { throw "Desktop binary not found: $DESKTOP" }
          if (-not (Test-Path $CLI)) { throw "CLI binary not found: $CLI" }
          Compress-Archive -Path $DESKTOP, $CLI -DestinationPath $ZIP_NAME
          gh release create "${{ github.ref_name }}" --draft --title "WDRProbe ${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}" 2>$null; if ($LASTEXITCODE -ne 0) { Write-Host "Release already exists" }
          gh release upload "${{ github.ref_name }}" $ZIP_NAME --clobber

      # ── Linux x86_64: ubuntu:20.04 Docker for glibc 2.31 ─────────────

      - name: Build (Linux x86_64, focal container)
        if: matrix.name == 'linux-x86_64'
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:20.04 \
            bash -c '
              set -ex
              apt-get update
              apt-get install -y \
                build-essential \
                libwebkit2gtk-4.0-dev libgtk-3-dev libappindicator3-dev \
                librsvg2-dev patchelf curl pkg-config

              curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
              source ~/.cargo/env

              curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
              apt-get install -y nodejs

              cd /work/Desktop
              npm ci
              npm run build
              cd src-tauri
              cargo build --release -p wdrprobe-desktop
              cargo build --release -p wdrprobe-cli
            '

      # ── Linux arm64: ubuntu:20.04 Docker, cross-compile ──────────────

      - name: Build (Linux arm64, focal container cross-compile)
        if: matrix.name == 'linux-arm64'
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:20.04 \
            bash -c '
              set -ex
              apt-get update
              dpkg --add-architecture arm64
              echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports focal main restricted universe multiverse" > /etc/apt/sources.list.d/arm64.list
              echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports focal-updates main restricted universe multiverse" >> /etc/apt/sources.list.d/arm64.list
              echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports focal-security main restricted universe multiverse" >> /etc/apt/sources.list.d/arm64.list
              sed -i "/^deb /{ /\[arch=/!s/^deb /deb [arch=amd64] / }" /etc/apt/sources.list
              apt-get update
              apt-get install -y \
                build-essential \
                gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
                libwebkit2gtk-4.0-dev:arm64 libgtk-3-dev:arm64 \
                libappindicator3-dev:arm64 librsvg2-dev:arm64 \
                libssl-dev:arm64 patchelf curl pkg-config

              curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
              source ~/.cargo/env
              rustup target add aarch64-unknown-linux-gnu
              printf "[target.aarch64-unknown-linux-gnu]\nlinker = \"aarch64-linux-gnu-gcc\"\n" >> ~/.cargo/config.toml

              curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
              apt-get install -y nodejs

              export PKG_CONFIG_ALLOW_CROSS=1
              export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig

              cd /work/Desktop
              npm ci
              npm run build
              cd src-tauri
              cargo build --release --target aarch64-unknown-linux-gnu -p wdrprobe-desktop
              cargo build --release --target aarch64-unknown-linux-gnu -p wdrprobe-cli
            '

      # ── Create zip + upload (Linux) ──────────────────────────────────

      - name: Create zip and upload (Linux)
        if: startsWith(matrix.name, 'linux')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ZIP_NAME="WDRProbe-${VERSION}-${{ matrix.name }}.zip"

          if [ "${{ matrix.cross }}" = "true" ]; then
            TARGET_DIR="target/aarch64-unknown-linux-gnu/release"
          else
            TARGET_DIR="target/release"
          fi

          DESKTOP="${TARGET_DIR}/wdrprobe-desktop"
          CLI="${TARGET_DIR}/wdrprobe-cli"
          if [ ! -f "$DESKTOP" ]; then echo "ERROR: $DESKTOP not found"; exit 1; fi
          if [ ! -f "$CLI" ]; then echo "ERROR: $CLI not found"; exit 1; fi

          ZIP_PATH="${RUNNER_TEMP}/${ZIP_NAME}"
          (cd "$TARGET_DIR" && zip "$ZIP_PATH" wdrprobe-desktop wdrprobe-cli)

          gh release create "${{ github.ref_name }}" \
            --draft --title "WDRProbe ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" 2>/dev/null || true
          gh release upload "${{ github.ref_name }}" "$ZIP_PATH" --clobber
